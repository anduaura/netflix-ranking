name: Refresh IMDb ratings

on:
  schedule:
    # Weekly, Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-ratings
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh shows.json from OMDb
        env:
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: python scripts/refresh_ratings.py

      - name: Commit and push if changed
        run: |
          set -e
          if [ -z "$(git status --porcelain shows.json)" ]; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shows.json
          git commit -m "chore(data): weekly IMDb ratings refresh"
          git push
