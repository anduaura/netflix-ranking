name: Refresh catalog and ratings

on:
  schedule:
    # Daily at 06:00 UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
    steps:
      # The PAT (BOT_PUSH_TOKEN) authenticates this checkout's git remote
      # so subsequent `git push` calls authenticate as the PAT's owner
      # (the repo admin). This satisfies the branch ruleset's "Repository
      # admin" bypass entry — without it, the default GITHUB_TOKEN would
      # push as github-actions[bot] which can't bypass branch protection
      # in personal repos.
      #
      # If BOT_PUSH_TOKEN is unset, checkout falls back to GITHUB_TOKEN
      # and the workflow still runs; the push step will fail loudly if
      # branch protection blocks it.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 1: incrementally grow the catalog from TMDb.
      # Skipped (with a warning, not a failure) if TMDB_API_KEY isn't set —
      # the OMDb refresh below still runs against whatever's in shows.json.
      - name: Grow catalog from TMDb
        if: ${{ env.TMDB_API_KEY != '' }}
        run: python scripts/refresh_catalog.py

      - name: Warn if TMDB_API_KEY missing
        if: ${{ env.TMDB_API_KEY == '' }}
        run: echo "::warning::TMDB_API_KEY secret not set; skipping catalog growth. Add it to grow shows.json beyond the curated seed."

      # Step 2: sharded LRU refresh of IMDb ratings via OMDb.
      - name: Refresh ratings shard from OMDb
        run: python scripts/refresh_ratings.py

      - name: Commit, PR, and admin-merge if changed
        # Run even when an earlier step failed — refresh_ratings.py
        # writes partial progress to shows.json before exiting on
        # OMDb quota exhaustion or auth failure, and we don't want to
        # discard that work just because the step ended non-zero.
        #
        # The main branch ruleset enforces "Require pull request before
        # merging", which can't be bypassed by direct push even with
        # admin role. So instead of `git push origin main`, the bot:
        #   1. Pushes the change to a unique side branch.
        #   2. Opens a PR via gh CLI (authed with the admin PAT).
        #   3. Merges the PR with `gh pr merge --admin` to bypass the
        #      approval and status-check requirements (the tests
        #      workflow doesn't run on shows.json-only changes due to
        #      its `paths:` filter, so --admin is the right escape).
        # The side branch auto-deletes after merge per the repo
        # setting "Automatically delete head branches".
        if: always()
        env:
          GH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ -z "$(git status --porcelain shows.json)" ]; then
            echo "No changes."
            exit 0
          fi

          BRANCH="bot/refresh-$(date -u +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add shows.json
          git commit -m "chore(data): refresh catalog + ratings shard"
          git push -u origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(data): refresh catalog + ratings shard" \
            --body "Automated daily refresh from \`refresh-ratings.yml\`. Auto-merged by the workflow with admin privileges to bypass the PR-required ruleset."

          gh pr merge "$BRANCH" --admin --rebase --delete-branch
