name: Tests

on:
  push:
    branches: [main]
    paths:
      - "app.js"
      - "config.js"
      - "index.html"
      - "tests/**"
      - ".github/workflows/tests.yml"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/package.json
      - name: Install jsdom
        working-directory: tests
        run: npm install --no-audit --no-fund --no-progress
      - name: Run tests
        working-directory: tests
        run: npm test
