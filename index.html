<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Top Netflix Shows by IMDb Rating</title>
  <meta name="description" content="An interactive ranking of Netflix originals and exclusives sorted by IMDb rating. Search, filter by genre, year, type and rating threshold." />
  <meta name="theme-color" content="#141414" />
  <meta property="og:title" content="Top Netflix Shows by IMDb Rating" />
  <meta property="og:description" content="Interactive ranking of Netflix originals and exclusives by IMDb rating." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23141414'/%3E%3Ctext x='50%25' y='58%25' text-anchor='middle' font-family='Arial' font-weight='900' font-size='20' fill='%23E50914'%3EN%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">N</span>
      <h1>Netflix IMDb Ranking</h1>
    </div>
    <p class="tagline">Netflix originals &amp; exclusives, ranked by IMDb rating.</p>
  </header>

  <section class="controls" aria-label="Filters">
    <div class="control search">
      <label for="q" class="sr-only">Search</label>
      <input id="q" type="search" placeholder="Search titles…" autocomplete="off" />
    </div>

    <div class="control">
      <label for="genre">Genre</label>
      <select id="genre"><option value="">All</option></select>
    </div>

    <div class="control">
      <label for="type">Type</label>
      <select id="type">
        <option value="">All</option>
        <option value="series">Series</option>
        <option value="limited-series">Limited series</option>
        <option value="movie">Movie</option>
      </select>
    </div>

    <div class="control">
      <label for="status">Status</label>
      <select id="status">
        <option value="">All</option>
        <option value="original">Netflix original</option>
        <option value="exclusive-region">Regional exclusive</option>
        <option value="library">Library</option>
      </select>
    </div>

    <div class="control">
      <label for="minRating">Min rating <span id="minRatingVal">0.0</span></label>
      <input id="minRating" type="range" min="0" max="10" step="0.1" value="0" />
    </div>

    <div class="control">
      <label for="sort">Sort by</label>
      <select id="sort">
        <option value="rating">Rating (high → low)</option>
        <option value="rating-asc">Rating (low → high)</option>
        <option value="votes">Votes</option>
        <option value="year-desc">Newest</option>
        <option value="year-asc">Oldest</option>
        <option value="title">Title (A–Z)</option>
      </select>
    </div>

    <button id="reset" class="ghost" type="button">Reset</button>
  </section>

  <main>
    <p class="meta" id="meta"></p>
    <ol id="list" class="ranking" aria-live="polite"></ol>
    <p id="empty" class="empty" hidden>No shows match your filters.</p>
  </main>

  <footer class="site-footer">
    <p>
      Data is a curated, static snapshot of publicly available IMDb ratings.
      Not affiliated with Netflix or IMDb. Last updated <span id="updated"></span>.
    </p>
    <p>
      <a href="https://github.com/anduaura/netflix-ranking" rel="noopener">Source on GitHub</a>
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
